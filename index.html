<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>blog_title</title>

    <!-- Marked (Markdown parser) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <!-- Highlight.js (syntax highlighting) -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <!-- KaTeX (LaTeX math) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
    <!-- YAML parser -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="app">
        <header id="header">
            <div class="logo" id="blog-title">Sample Title</div>
            <div class="breadcrumb" id="breadcrumb">
                <span class="sep">/ #</span>
                <span class="current" id="bc-path">index</span>
            </div>
            <div class="status" id="status-bar">READY</div>
        </header>

         <span id="sidebar-button">
            <i class="fa fa-bars"></i>
        </span>

        <nav id="sidebar">
            <div class="sidebar-section-label">Navigator</div>
            <div class="tree-root" id="tree-root">
                <!-- populated by JS -->
            </div>
        </nav>

        <main id="main">
            <div id="glass"></div>
            <div class="content-area">
                <div id="loading">
                    <div class="spinner"></div>
                    <span>Initialising...</span>
                </div>
                <div id="error-state"></div>
                <div id="content" style="display:none">
                    <div class="tab-header"><span class="fa fa-file"></span>&nbsp;<span id="main-tab">Header</span></div>
                    <div class="md-body" id="md-body"></div>
                </div>
            </div>
        </main>

        <footer id="footer">
            <div class="breadcrumb breadcrumb-nooverflow" id="author-info">
                <span><i class="fa fa-user" aria-hidden="true"></i>&nbsp;</span>
                <a href="#" target="_blank" id="author-link" rel="noopener noreferrer"><span id="author-name"></span></a>
            </div>
            <div class="breadcrumb">
                <span><i class="fa fa-plus"></i>&nbsp;</span>
                <span id="date-created"></span>
            </div>
            <div class="breadcrumb">
                <span><i class="fa fa-sync"></i>&nbsp;</span>
                <span id="date-modified"></span>
            </div>
        </footer>
    </div>
    <script src="index.js"></script>
    <script>
        boot();
    </script>
</body>

</html>
